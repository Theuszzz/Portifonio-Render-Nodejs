<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portfólio | Seu Nome</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <nav>
      <h1 id="name">Carregando...</h1>
      <span id="title"></span>
    </nav>
  </header>

  <main>
    <section id="about">
      <h2>Sobre</h2>
      <p id="about-text"></p>
    </section>

    <section id="skills">
      <h2>Skills</h2>
      <ul id="skills-list"></ul>
    </section>

    <section id="projects">
      <h2>Projetos & Repositórios</h2>
      <div id="projects-grid" class="grid"></div>
    </section>

    <section id="contact">
      <h2>Contato</h2>
      <p id="contact-links"></p>
    </section>
  </main>

  <footer>
    <p>© <span id="year"></span> <span id="footer-name"></span> | Feito com Node.js + Express</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
